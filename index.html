<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloxHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: #e8e8e8;
      background-image: repeating-linear-gradient(
          0deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px
        ),
        repeating-linear-gradient(
          90deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px
        );
      min-height: 100vh;
      color: #222;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      background: #1a1a2e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 4px solid #00b2ff;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #e2231a;
      border-radius: 6px;
      border: 3px solid #ffc800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transform: rotate(10deg);
    }

    .topbar input {
      flex: 1;
      max-width: 400px;
      padding: 10px 16px;
      border: 3px solid #333;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    .topbar input:focus {
      border-color: #00b2ff;
    }

    .topbar-avatar {
      width: 42px;
      height: 42px;
      background: #ffc800;
      border: 3px solid #e2231a;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-left: auto;
    }

    .topbar-badge {
      background: #e2231a;
      color: #fff;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      border: 2px solid #ffc800;
      font-weight: 600;
    }

    /* ===== CATEGORIES ===== */
    .categories {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      overflow-x: auto;
      background: #fff;
      border-bottom: 3px solid #ddd;
    }

    .cat-chip {
      white-space: nowrap;
      padding: 8px 20px;
      border-radius: 20px;
      background: #f0f0f0;
      border: 3px solid #ccc;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .cat-chip:hover {
      background: #00b2ff;
      border-color: #0088cc;
      color: #fff;
      transform: scale(0.95);
    }

    .cat-chip.active {
      background: #1a1a2e;
      border-color: #00b2ff;
      color: #fff;
    }

    /* ===== HERO ===== */
    .hero {
      margin: 20px 24px;
      padding: 32px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 4px solid #00b2ff;
      border-radius: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .hero h1 {
      font-size: 32px;
      line-height: 1.2;
    }

    .hero h1 span {
      color: #ffc800;
    }

    .hero p {
      font-size: 16px;
      opacity: 0.8;
      margin-top: 8px;
    }

    .hero-btn {
      background: #e2231a;
      border: none;
      border-bottom: 6px solid #991410;
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 32px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.08s linear;
      white-space: nowrap;
    }

    .hero-btn:active {
      border-bottom-width: 2px;
      transform: translateY(4px);
    }

    /* ===== GAME GRID ===== */
    .section-title {
      font-size: 22px;
      padding: 0 24px;
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .brick {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #e2231a;
      border-radius: 3px;
      border: 2px solid #991410;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
      padding: 0 24px 40px;
    }

    .game-card {
      background: #fff;
      border: 4px solid #ccc;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.1s;
    }

    .game-card:hover {
      border-color: #00b2ff;
      transform: translateY(-4px) scale(1.02);
    }

    .game-card:active {
      transform: translateY(0px) scale(0.97);
    }

    .game-thumb {
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      position: relative;
    }

    .game-thumb .player-count {
      position: absolute;
      bottom: 6px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .game-info {
      padding: 12px;
    }

    .game-info h3 {
      font-size: 16px;
      margin-bottom: 4px;
    }

    .game-info .creator {
      font-size: 13px;
      color: #777;
    }

    .game-info .row2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .stars {
      color: #ffc800;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .like-btn {
      background: none;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
    }

    .like-btn:hover {
      background: #e2231a;
      border-color: #e2231a;
      color: #fff;
    }

    .like-btn.liked {
      background: #e2231a;
      border-color: #e2231a;
      color: #fff;
    }

    /* ===== BRICK DECORATION ===== */
    .brick-divider {
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        #e2231a 0px, #e2231a 30px,
        #991410 30px, #991410 32px,
        #e2231a 32px, #e2231a 62px,
        #cc1c14 62px, #cc1c14 64px
      );
      margin: 0;
      border: none;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: #1a1a2e;
      color: #888;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      border-top: 4px solid #00b2ff;
    }

    .footer b {
      color: #ffc800;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      border-radius: 10px;
      border: 3px solid #00b2ff;
      font-weight: 600;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <nav class="topbar">
    <div class="logo">
      <div class="logo-icon">B</div>
      BloxHub
    </div>
    <input type="text" placeholder="Search games..." />
    <span class="topbar-badge">2.4M+ players</span>
    <div class="topbar-avatar" id="avatarBtn">😎</div>
  </nav>

  <!-- CATEGORIES -->
  <div class="categories">
    <span class="cat-chip active">Featured</span>
    <span class="cat-chip">Popular</span>
    <span class="cat-chip">Adventure</span>
    <span class="cat-chip">Racing</span>
    <span class="cat-chip">Simulator</span>
    <span class="cat-chip">FPS</span>
    <span class="cat-chip">Roleplay</span>
    <span class="cat-chip">Obby</span>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1>Build. Play. <span>Create.</span></h1>
      <p>Jump into millions of worlds made by the community.</p>
    </div>
    <button class="hero-btn" id="playBtn">▶ Play Now</button>
  </section>

  <!-- BRICK DIVIDER -->
  <div class="brick-divider"></div>

  <!-- GAME GRID -->
  <div class="section-title">
    <span class="brick"></span> Trending Games
  </div>
  <div class="game-grid" id="gameGrid"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- FOOTER -->
  <div class="footer">
    Made with <b>♥</b> &nbsp;|&nbsp; Not affiliated with Roblox Corp
  </div>

  <script>
    const games = [
      { name: 'Blocky Adventures', creator: '@blockmaster', color: '#e2231a', players: '12.4K', stars: 4 },
      { name: 'Speed Run Tycoon', creator: '@speeddev', color: '#00b2ff', players: '8.7K', stars: 5 },
      { name: 'Prison Escape 2', creator: '@escapegames', color: '#ffc800', players: '23.1K', stars: 4 },
      { name: 'Dragon simulator', creator: '@fantasydev', color: '#6c5ce7', players: '5.2K', stars: 3 },
      { name: 'Obby Parkour!', creator: '@parkourpro', color: '#00cec9', players: '45.6K', stars: 5 },
      { name: 'Tower Defense X', creator: '@tddev', color: '#fd79a8', players: '9.8K', stars: 4 },
      { name: 'Build Battle', creator: '@builderdev', color: '#e17055', players: '3.4K', stars: 5 },
      { name: 'Vehicle Sim', creator: '@wheeldev', color: '#00b894', players: '7.1K', stars: 3 },
      { name: 'Mini Kart 2D', creator: '@you', color: '#27ae60', players: '🕹️', stars: 4, link: 'minigame.html' },
      { name: 'Cool Guys Racing', creator: '@you', color: '#1a1a2e', players: '🔥 NEW', stars: 5, link: 'coolguys.html' },
      { name: 'Volcano Valley', creator: '@you', color: '#ff4400', players: '🗺️ POSTER', stars: 5, link: 'volcano_valley.html' },
    ];

    const grid = document.getElementById('gameGrid');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function renderStars(n) {
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    games.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      if (g.link) card.dataset.link = g.link;
      card.innerHTML = `
        <div class="game-thumb" style="background:${g.color}">
          ${g.link ? '🏎️' : '🎮'}
          <span class="player-count">${g.link ? '⚡ ' : '🟢 '}${g.players}</span>
        </div>
        <div class="game-info">
          <h3>${g.name}${g.link ? ' <span style="color:#e2231a;font-size:12px;background:#ffc800;padding:0 8px;border-radius:4px;vertical-align:middle;">PLAY</span>' : ''}</h3>
          <div class="creator">${g.creator}</div>
          <div class="row2">
            <span class="stars">${renderStars(g.stars)}</span>
            <button class="like-btn" data-i="${i}">♥ Like</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    // Like buttons
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.like-btn');
      if (btn) {
        btn.classList.toggle('liked');
        showToast(btn.classList.contains('liked') ? '♥ Liked!' : 'Like removed');
        return;
      }
      const card = e.target.closest('.game-card');
      if (card) {
        if (card.dataset.link) {
          window.location.href = card.dataset.link;
          return;
        }
        const name = card.querySelector('h3').textContent;
        showToast(`🎮 Playing "${name}"...`);
      }
    });

    // Play button
    document.getElementById('playBtn').addEventListener('click', () => {
      const random = games[Math.floor(Math.random() * games.length)];
      showToast(`🎮 Launching "${random.name}"...`);
    });

    // Avatar
    document.getElementById('avatarBtn').addEventListener('click', () => {
      const faces = ['😎', '🤠', '👾', '🤖', '👽', '🦊', '🐉'];
      const current = document.getElementById('avatarBtn').textContent;
      let next;
      do { next = faces[Math.floor(Math.random() * faces.length)]; } while (next === current);
      document.getElementById('avatarBtn').textContent = next;
      showToast(`Avatar changed to ${next}`);
    });

    // Category chips
    document.querySelectorAll('.cat-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        showToast(`Showing: ${chip.textContent}`);
      });
    });

    // Search
    document.querySelector('.topbar input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('.game-card').forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = title.includes(q) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
