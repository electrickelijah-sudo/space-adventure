<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Circuit - Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #1a1a1a;
            font-family: 'Fredoka', Arial, sans-serif;
            overflow: hidden;
        }
        #gameCanvas { width: 100%; height: 100%; display: block; }

        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; font-size: 18px; z-index: 100;
            text-shadow: 2px 2px 0 #000;
        }

        #speedometer {
            position: absolute; bottom: 30px; left: 30px;
            width: 200px; height: 100px;
            background: rgba(0,0,0,0.75);
            border: 3px solid #ff6600;
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-weight: 600;
            z-index: 100;
        }
        .speed-bar {
            width: 100%; height: 18px;
            background: #333;
            border-radius: 5px; margin-top: 8px; overflow: hidden;
        }
        .speed-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff6600);
            width: 0%; transition: width 0.05s;
        }

        #lap {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.75);
            border: 3px solid #ff6600;
            border-radius: 10px;
            padding: 12px 20px;
            color: #fff; font-weight: 600; font-size: 18px;
            z-index: 100;
        }

        #controls {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(0,0,0,0.75);
            border: 3px solid #ff6600;
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px; line-height: 1.7;
            z-index: 100;
        }
        .control-row { margin: 3px 0; }

        #countdownOverlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 200;
        }
        #countdownText {
            font-size: 130px; font-weight: 700;
            color: #fff;
            text-shadow: 6px 6px 0 #000, 0 0 40px rgba(0,0,0,0.7);
            opacity: 0;
            transform: scale(2);
            transition: all 0.15s;
            font-family: 'Fredoka', Arial, sans-serif;
        }
        #countdownText.show {
            opacity: 1;
            transform: scale(1);
        }
        #countdownText.go {
            color: #ffc800;
            text-shadow: 6px 6px 0 #e2231a, 0 0 60px rgba(255,200,0,0.5);
        }
        #countdownText.rocket {
            color: #00ff88;
            text-shadow: 6px 6px 0 #006633, 0 0 60px rgba(0,255,136,0.6);
        }

        #driftBar {
            position: absolute; bottom: 150px; left: 50%;
            transform: translateX(-50%);
            width: 220px; height: 14px;
            background: rgba(0,0,0,0.65);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 7px;
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        #driftFill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00b2ff, #ffc800, #e2231a);
            border-radius: 5px;
            transition: width 0.05s;
        }

        #driftLabel {
            position: absolute; bottom: 168px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px; font-weight: 600;
            text-shadow: 1px 1px 0 #000;
            z-index: 100;
            display: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Fredoka', Arial, sans-serif;
        }

        #rocketHint {
            position: absolute; bottom: 100px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 14px; font-weight: 600;
            text-shadow: 2px 2px 0 #000;
            z-index: 100;
            display: none;
            font-family: 'Fredoka', Arial, sans-serif;
        }

        #itemSlot {
            position: absolute; bottom: 140px; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.75);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #itemIcon {
            font-size: 36px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div>🏁 Mario Circuit</div>
    </div>

    <div id="lap">
        <div>Lap: <span id="lapCount">1/3</span></div>
        <div style="font-size:14px;margin-top:4px;">Time: <span id="raceTime">0:00</span></div>
        <div style="font-size:14px;margin-top:4px;">Coins: <span id="coinCount">0</span></div>
    </div>

    <div id="itemSlot">
        <div id="itemIcon"></div>
    </div>

    <div id="speedometer">
        <div>SPEED: <span id="speedValue">0</span> km/h</div>
        <div class="speed-bar"><div class="speed-fill" id="speedFill"></div></div>
    </div>

    <div id="countdownOverlay">
        <div id="countdownText"></div>
    </div>

    <div id="driftLabel">DRIFT</div>
    <div id="driftBar"><div id="driftFill"></div></div>

    <div id="rocketHint">🏁 Press W at GO! for Rocket Start</div>

    <div id="controls">
        <div style="font-weight:700;margin-bottom:4px;">Controls</div>
        <div class="control-row">↑/W - Gas</div>
        <div class="control-row">↓/S - Brake</div>
        <div class="control-row">←/D - Left &nbsp; →/A - Right</div>
        <div class="control-row">Shift - Drift</div>
        <div class="control-row">E - Use Item</div>
        <div class="control-row">Space - Boost</div>
        <div class="control-row" style="font-size:11px;color:#aaa;margin-top:4px;">Click canvas for mouse look</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/babylonjs@7.32.0/babylon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babylonjs-loaders@7.32.0/babylonjs.loaders.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
