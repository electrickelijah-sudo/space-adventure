<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Kart - 2D Race</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 6px solid #f1c40f;
            border-radius: 10px;
            background-color: #27ae60;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .ui {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        .back-link {
            margin-top: 10px;
            color: #f1c40f;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="ui" id="hud">Lap: 1/3</div>
    <a class="back-link" href="index.html">← Back to BloxHub</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');

        const kart = {
            x: 150, y: 350,
            angle: 0,
            speed: 0,
            maxSpeed: 4.5,
            offRoadSpeed: 1.5,
            accel: 0.2,
            friction: 0.05,
            radius: 15
        };

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        let currentLap = 1;
        let finishLineCrossed = false;

        function drawTrack() {
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 40;
            ctx.beginPath();
            ctx.roundRect(50, 50, 700, 500, 50);
            ctx.stroke();

            ctx.beginPath();
            ctx.roundRect(200, 200, 400, 200, 30);
            ctx.stroke();

            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(480, 50, 20, 150);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(480, 75, 10, 25);
            ctx.fillRect(480, 125, 10, 25);
        }

        function isOffRoad() {
            const pixel = ctx.getImageData(kart.x, kart.y, 1, 1).data;
            return pixel[0] !== 39 || pixel[1] !== 174 || pixel[2] !== 96;
        }

        function update() {
            if (keys.ArrowUp) kart.speed += kart.accel;
            if (keys.ArrowDown) kart.speed -= kart.accel;

            if (kart.speed > 0) kart.speed -= kart.friction;
            if (kart.speed < 0) kart.speed += kart.friction;

            const activeMaxSpeed = isOffRoad() ? kart.offRoadSpeed : kart.maxSpeed;
            if (kart.speed > activeMaxSpeed) kart.speed = activeMaxSpeed;
            if (kart.speed < -activeMaxSpeed) kart.speed = -activeMaxSpeed;

            if (keys.ArrowLeft) kart.angle -= 0.05 * (kart.speed / 3);
            if (keys.ArrowRight) kart.angle += 0.05 * (kart.speed / 3);

            kart.x += Math.cos(kart.angle) * kart.speed;
            kart.y += Math.sin(kart.angle) * kart.speed;

            if (kart.x > 450 && kart.x < 510 && kart.y > 50 && kart.y < 200) {
                if (!finishLineCrossed) {
                    finishLineCrossed = true;
                    currentLap++;
                    if (currentLap > 3) {
                        alert("You Win!");
                        currentLap = 1;
                    }
                    hud.innerText = `Lap: ${Math.min(currentLap, 3)}/3`;
                }
            } else {
                finishLineCrossed = false;
            }
        }

        function drawKart() {
            ctx.save();
            ctx.translate(kart.x, kart.y);
            ctx.rotate(kart.angle);

            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.arc(0, 0, kart.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(5, 0, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTrack();
            update();
            drawKart();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
